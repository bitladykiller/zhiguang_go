#################################################
## mysql serverId , v1.0.26+ will autoGen
canal.instance.mysql.slaveId=1001

# enable gtid use true/false
canal.instance.gtidon=false

# position info
canal.instance.master.address=mysql:3306
canal.instance.master.journal.name=
canal.instance.master.position=
canal.instance.master.timestamp=
canal.instance.master.gtid=

# username/password
canal.instance.dbUsername=root
canal.instance.dbPassword=root123
canal.instance.connectionCharset=UTF-8

# table regex: only subscribe the transactional outbox table used by this project
canal.instance.filter.regex=zhiguang\\.outbox
# table black regex
canal.instance.filter.black.regex=mysql\\.slave_.*

# mq config (unused in tcp mode but keep destination aligned with the app config)
canal.mq.topic=example
