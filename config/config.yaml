server:
  port: 8080
  mode: debug

database:
  host: localhost
  port: 3306
  user: root
  password: "your_password"
  name: zhiguang
  charset: utf8mb4
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 20

id_generator:
  machine_id: 0
  worker_id: 1

kafka:
  brokers:
    - localhost:9092
    - localhost:9093
    - localhost:9094
  consumer_group: counter-agg
  topics:
    counter_events: counter-events

elasticsearch:
  uris:
    - http://localhost:9200
  index_name: zhiguang-ai-index

auth:
  jwt:
    issuer: zhiguang
    key_id: zhiguang-key
    private_key_path: config/keys/private.pem
    public_key_path: config/keys/public.pem
    access_token_ttl: 15m
    refresh_token_ttl: 168h
  verification:
    code_length: 6
    ttl: 5m
    max_attempts: 5
    send_interval: 60s
    daily_limit: 10
    lock:
      ttl_ms: 5000
      watchdog_ms: 15000
      retry_interval_ms: 100
  refresh:
    lock:
      ttl_ms: 5000
      watchdog_ms: 15000
      retry_interval_ms: 100
  password:
    bcrypt_cost: 12
    min_length: 8

oss:
  endpoint: oss-cn-beijing.aliyuncs.com
  access_key_id: "your_access_key"
  access_key_secret: "your_secret"
  bucket: "your_bucket"
  public_domain: ""
  folder: avatars

canal:
  enabled: true
  host: localhost
  port: 11111
  destination: example
  username: canal
  password: "Canal@123456"
  filter: zhiguang\\.outbox
  batch_size: 1000
  interval_ms: 1000

counter:
  rebuild:
    enabled: false
    lock:
      ttl_ms: 5000
      watchdog_ms: 30000
    rate:
      permits: 3
      window_seconds: 10
    backoff:
      base_ms: 500
      max_ms: 30000

cache:
  l2:
    public_cfg:
      ttl_seconds: 15
      max_size: 1000
    mine_cfg:
      ttl_seconds: 10
      max_size: 1000
  hotkey:
    bucket_size_seconds: 6
    bucket_count: 10
    flush_interval_seconds: 6
    stat_ttl_seconds: 120
    level_low: 50
    level_medium: 200
    level_high: 500
    extend_low_seconds: 20
    extend_medium_seconds: 60
    extend_high_seconds: 120
    hot_mark_ttl_seconds: 60

llm:
  deepseek:
    api_key: "your_api_key"
    base_url: https://api.deepseek.com
    model: deepseek-chat
    temperature: 0.8
  openai:
    base_url: https://dashscope.aliyuncs.com/compatible-mode
    api_key: "your_api_key"
    embedding_model: text-embedding-v4
    dimensions: 1536
