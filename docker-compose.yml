x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    build:
      context: ./frontend
    container_name: zhiguang-frontend
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - edge
      - backend
    logging: *default-logging

  app:
    build: .
    container_name: zhiguang-server
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    command: ["-config", "config/config-docker.yaml"]
    expose:
      - "8080"
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      canal:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - backend
    logging: *default-logging

  mysql:
    image: mysql:8.0.30
    container_name: zhiguang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zhiguang_root_admin}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: zhiguang
      MYSQL_USER: zhiguang
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zhiguang_app_user}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-zhiguang_root_admin}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: zhiguang-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    logging: *default-logging

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zhiguang-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - backend
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: zhiguang-kafka-1
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - backend
    logging: *default-logging

  kafka2:
    image: confluentinc/cp-kafka:7.5.3
    container_name: zhiguang-kafka-2
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - backend
    logging: *default-logging

  kafka3:
    image: confluentinc/cp-kafka:7.5.3
    container_name: zhiguang-kafka-3
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - backend
    logging: *default-logging

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: zhiguang-kafka-init
    restart: "no"
    depends_on:
      - kafka
      - kafka2
      - kafka3
    entrypoint:
      - /bin/bash
      - -lc
      - |
        cub kafka-ready -b kafka:9092 1 60
        cub kafka-ready -b kafka2:9092 1 60
        cub kafka-ready -b kafka3:9092 1 60
        kafka-topics --bootstrap-server kafka:9092,kafka2:9092,kafka3:9092 --create --if-not-exists --topic counter-events --replication-factor 3 --partitions 3 --config min.insync.replicas=2
        kafka-topics --bootstrap-server kafka:9092,kafka2:9092,kafka3:9092 --create --if-not-exists --topic canal-outbox --replication-factor 3 --partitions 3 --config min.insync.replicas=2
    networks:
      - backend
    logging: *default-logging

  canal:
    build:
      context: .
      dockerfile: docker/canal/Dockerfile
    platform: linux/amd64
    container_name: zhiguang-canal
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - canal_conf:/home/admin/canal-server/conf/example
      - canal_logs:/home/admin/canal-server/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 11111"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend
    logging: *default-logging

  elasticsearch:
    image: elasticsearch:8.5.0
    container_name: zhiguang-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - backend
    logging: *default-logging

volumes:
  mysql_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka1_data:
  kafka2_data:
  kafka3_data:
  canal_conf:
  canal_logs:
  es_data:

secrets:
  jwt_private_key:
    file: ./config/keys/private.pem
  jwt_public_key:
    file: ./config/keys/public.pem

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
